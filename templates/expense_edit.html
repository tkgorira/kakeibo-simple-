{% extends "base.html" %}
{% block content %}

<div class="section-title">支出を編集</div>
<div class="card">
  <form method="POST" action="/expense/{{ e.id }}/edit">

    <input type="hidden" name="expense_date" id="expense_date">
    <div class="form-group">
      <label>日付</label>
      <div style="position:relative;">
        <input type="text" id="d_display" placeholder="2026/01/01" readonly
               style="cursor:pointer;" onclick="document.getElementById('d_picker').showPicker()">
        <input type="date" id="d_picker" style="position:absolute;opacity:0;top:0;left:0;width:100%;height:100%;cursor:pointer;">
      </div>
    </div>
    <div class="form-group">
      <label>金額</label>
      <input type="number" name="amount" value="{{ e.amount }}" min="1" required inputmode="numeric">
    </div>

    <div class="form-group">
      <label>カテゴリ</label>
      <select name="category">
        {% for c in categories %}
        <option value="{{ c }}" {% if c == e.category %}selected{% endif %}>{{ c }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label>メモ（任意）</label>
      <input type="text" name="note" value="{{ e.note or '' }}" placeholder="例: スーパー">
    </div>

    <div class="form-group">
      <label>支払い方法</label>
      <div class="payment-tabs">
        <input type="radio" name="payment_type" id="pt_cash" value="cash"
          {% if e.payment_type == 'cash' %}checked{% endif %} onchange="toggleCard()">
        <label for="pt_cash">現金</label>
        <input type="radio" name="payment_type" id="pt_card" value="card"
          {% if e.payment_type == 'card' %}checked{% endif %} onchange="toggleCard()">
        <label for="pt_card">クレカ</label>
      </div>
    </div>

    <div id="card-selector" class="form-group">
      <label>カードを選択</label>
      {% if cards %}
      <select name="card_id">
        {% for card in cards %}
        <option value="{{ card.id }}" {% if card.id == e.card_id %}selected{% endif %}>
          {{ card.name }}（締め日: {{ card.closing_day }}日）
        </option>
        {% endfor %}
      </select>
      {% else %}
      <p style="font-size:0.8rem;color:#e74c3c;">⚠ カードが登録されていません。設定から追加してください。</p>
      {% endif %}
    </div>

    <div style="display:flex; gap:8px; margin-top:8px;">
      <a href="/expense" class="btn btn-block" style="background:#95a5a6;color:#fff;text-align:center;text-decoration:none;padding:12px 0;">キャンセル</a>
      <button type="submit" class="btn btn-success btn-block">更新する</button>
    </div>
  </form>
</div>

{% endblock %}

{% block scripts %}
<script>
function toggleCard() {
  const isCard = document.getElementById('pt_card').checked;
  const sel = document.getElementById('card-selector');
  sel.classList.toggle('show', isCard);
}
toggleCard();

(function() {
  const disp   = document.getElementById('d_display');
  const picker = document.getElementById('d_picker');
  const hidden = document.getElementById('expense_date');
  const init   = '{{ e.expense_date }}';

  function setDate(iso) {
    hidden.value = iso;
    picker.value = iso;
    disp.value   = iso.replace(/-/g, '/');
  }
  setDate(init);

  picker.addEventListener('change', function() {
    if (picker.value) setDate(picker.value);
  });

  document.querySelector('form').addEventListener('submit', function(e) {
    if (!/^\d{4}-\d{2}-\d{2}$/.test(hidden.value)) {
      e.preventDefault();
      alert('日付を選択してください');
    }
  });
})();
</script>
{% endblock %}
